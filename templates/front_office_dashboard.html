<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMS Pro | Front Office Console</title>
    <!-- Modern Yazı Tipleri ve İkonlar -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        :root {
            --sidebar-width: 260px;
            --primary: #4f46e5;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg-gray: #f1f5f9;
        }

        body { font-family: 'Poppins', sans-serif; background: var(--bg-gray); margin: 0; display: flex; overflow: hidden; }
        
        /* Oda Kartı Tasarımı */
        .room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; }
        .room-card {
            background: white; border-radius: 12px; padding: 20px; text-align: center;
            border-bottom: 5px solid #ccc; transition: all 0.3s ease; cursor: pointer;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .room-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .room-card.occupied { border-bottom-color: var(--danger); }
        .room-card.vacant { border-bottom-color: var(--success); }
        .room-number { font-size: 1.5rem; font-weight: 600; display: block; margin-bottom: 5px; }
        
        /* Durum Rozetleri */
        .status-pill { font-size: 0.7rem; padding: 4px 8px; border-radius: 20px; font-weight: 500; text-transform: uppercase; }
        .clean { background: #dcfce7; color: #166534; }
        .dirty { background: #fee2e2; color: #991b1b; }
        
        /* Sidebar ve Header */
        .sidebar { width: var(--sidebar-width); background: #1e293b; color: white; height: 100vh; padding: 20px; }
        .main-stage { flex: 1; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
        .header { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        
        /* Formlar */
        .booking-modal { background: white; border-radius: 15px; padding: 25px; max-width: 500px; margin: 50px auto; }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 style="color: var(--primary); margin-bottom: 30px;">🏨 PMS PRO</h2>
        <nav>
            <div class="nav-item active" onclick="showSection('room-view')"><i class="fa fa-th-large"></i> Oda Planı</div>
            <div class="nav-item" onclick="showSection('booking-list')"><i class="fa fa-list"></i> Rezervasyonlar</div>
            <div class="nav-item" onclick="showSection('new-res')"><i class="fa fa-plus-circle"></i> Yeni Kayıt</div>
        </nav>
    </aside>

    <div class="main-stage">
        <!-- HEADER -->
        <header class="header">
            <div class="live-status"><span class="pulse-dot"></span> Sistem Çevrimiçi</div>
            <div class="user-profile"><strong>{{ username }}</strong> | <a href="/" style="text-decoration:none; color:var(--danger);">Çıkış</a></div>
        </header>

        <!-- ODA PLANI (Görsel Grid) -->
        <section id="room-view" class="content-section active">
            <div class="room-grid" id="roomGrid">
                <!-- JavaScript burayı dolduracak -->
            </div>
        </section>

        <!-- REZERVASYON LİSTESİ -->
        <section id="booking-list" class="content-section" style="display:none; padding:20px;">
            <div class="card">
                <h3>Güncel Rezervasyonlar</h3>
                <table id="resTable" width="100%">
                    <!-- JS ile dolacak -->
                </table>
            </div>
        </section>
    </div>

    <script>
        const token = new URLSearchParams(window.location.search).get('token') || "{{ token }}";

        // VERİLERİ ÇEK VE EKRANI ÇİZ
        async function refreshConsole() {
            const [rRes, bRes] = await Promise.all([
                fetch(`/api/rooms?token=${token}`),
                fetch(`/api/bookings?token=${token}`)
            ]);
            const rooms = await rRes.json();
            renderRooms(rooms);
        }

        function renderRooms(rooms) {
            const grid = document.getElementById('roomGrid');
            grid.innerHTML = rooms.map(room => `
                <div class="room-card ${room.occupancy === 'Occupied' ? 'occupied' : 'vacant'}">
                    <span class="room-number">${room.id}</span>
                    <small style="color:#64748b">${room.room_type}</small>
                    <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">
                    <div style="margin-bottom:10px">
                        <span class="status-pill ${room.status.toLowerCase()}">
                            ${room.status === 'Clean' ? '✨ Temiz' : '🧹 Kirli'}
                        </span>
                    </div>
                    <small><strong>${room.occupancy === 'Occupied' ? '🔴 DOLU' : '🟢 BOŞ'}</strong></small>
                </div>
            `).join('');
        }

        // WEBSOCKET: ANLIK GÜNCELLEME
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
        ws.onmessage = (e) => { if(e.data === "rooms_updated") refreshConsole(); };

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        window.onload = refreshConsole;
    </script>
</body>
</html>
