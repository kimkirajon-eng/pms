<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Housekeeping Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="hk-body">
    <header class="hk-header">
        <h1>🧹 Housekeeping Paneli</h1>
        <div class="hk-controls">
            <span class="user-info">Hoşgeldiniz, <strong>{{ username }}</strong></span>
            <a href="/" class="btn btn-quiet">Çıkış Yap</a>
        </div>
    </header>

    <main class="hk-main">
        <section class="rooms-section">
            <h2>Oda Listesi ve Temizlik Durumları</h2>
            <table class="rooms-table">
                <thead>
                    <tr>
                        <th>Oda No</th>
                        <th>Oda Tipi</th>
                        <th>Durum</th>
                        <th>Doluluk</th>
                        <th>Aksiyon</th>
                    </tr>
                </thead>
                <tbody>
                    {% for room in rooms %}
                    <tr class="room-row status-{{ room.status|lower }}">
                        <td><strong>{{ room.id }}</strong></td>
                        <td>{{ room.room_type }}</td>
                        <td>
                            <span class="status-badge">{{ room.status }}</span>
                        </td>
                        <td>{{ room.occupancy }}</td>
                        <td class="col-actions">
                            <!-- Durum Güncelleme Butonları -->
                            <button onclick="updateStatus({{ room.id }}, 'Clean')" class="btn btn-small btn-success">Temiz</button>
                            <button onclick="updateStatus({{ room.id }}, 'Dirty')" class="btn btn-small btn-danger">Kirli</button>
                            <button onclick="updateStatus({{ room.id }}, 'OutOfOrder')" class="btn btn-small">Arızalı</button>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="5" class="empty">Görüntülenecek oda bulunamadı.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>
    </main>

    <script>
        async function updateStatus(roomId, newStatus) {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            try {
                const response = await fetch(`/api/rooms/${roomId}/status?new_status=${newStatus}&token=${token}`, {
                    method: 'PUT'
                });
                
                if (response.ok) {
                    alert(`Oda ${roomId} durumu ${newStatus} olarak güncellendi!`);
                    location.reload(); // Sayfayı yenile ve güncel durumu gör
                } else {
                    alert("Güncelleme sırasında bir hata oluştu.");
                }
            } catch (error) {
                console.error("Hata:", error);
            }
        }
    </script>
</body>
</html>
